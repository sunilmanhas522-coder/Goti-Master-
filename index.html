<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Goti Master Pro</title>
    <style>
        body { background-color: #2c1a1a; color: #f1c40f; font-family: sans-serif; text-align: center; margin: 0; padding: 10px; touch-action: manipulation; }
        h1 { font-size: 24px; margin-bottom: 5px; color: #f39c12; }
        .status { font-size: 20px; margin-bottom: 15px; font-weight: bold; padding: 5px; background: #3d2b2b; border-radius: 8px; }
        .board { display: grid; grid-template-columns: repeat(5, 1fr); gap: 10px; max-width: 350px; margin: 0 auto; background: #5d4037; padding: 15px; border-radius: 12px; border: 4px solid #3e2723; box-shadow: 0 10px 20px rgba(0,0,0,0.5); }
        .cell { aspect-ratio: 1/1; background: #8d6e63; border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer; border: 2px solid #5d4037; }
        .bead { width: 85%; height: 85%; border-radius: 50%; box-shadow: 2px 2px 5px rgba(0,0,0,0.4); }
        .red { background: radial-gradient(circle at 30% 30%, #ff5252, #b71c1c); }
        .blue { background: radial-gradient(circle at 30% 30%, #448aff, #0d47a1); }
        .selected { border: 4px solid #fff; box-shadow: 0 0 15px #fff; transform: scale(1.1); }
        button { margin-top: 20px; background: #f39c12; color: #fff; border: none; padding: 12px 25px; font-size: 18px; border-radius: 25px; font-weight: bold; box-shadow: 0 4px #d35400; }
        button:active { box-shadow: 0 2px #d35400; transform: translateY(2px); }
    </style>
</head>
<body>
    <h1>Goti Master Pro</h1>
    <div class="status" id="status">Red's Turn</div>
    <div id="board" class="board"></div>
    <button onclick="resetGame()">Restart Game</button>

    <script>
        const boardElement = document.getElementById('board');
        const statusElement = document.getElementById('status');
        let board = Array(25).fill(null);
        let selectedIndex = null;
        let turn = 'red';

        function init() {
            board = Array(25).fill(null);
            for(let i=0; i<12; i++) board[i] = 'red';
            for(let i=13; i<25; i++) board[i] = 'blue';
            turn = 'red';
            selectedIndex = null;
            render();
        }

        function render() {
            boardElement.innerHTML = '';
            board.forEach((cell, i) => {
                const div = document.createElement('div');
                div.className = 'cell';
                if (cell) {
                    const bead = document.createElement('div');
                    bead.className = `bead ${cell} ${selectedIndex === i ? 'selected' : ''}`;
                    div.appendChild(bead);
                }
                div.onclick = () => handleClick(i);
                boardElement.appendChild(div);
            });
            statusElement.innerText = turn.toUpperCase() + "'S TURN";
            statusElement.style.color = turn === 'red' ? '#ff5252' : '#448aff';
        }

        function handleClick(i) {
            if (board[i] === turn) {
                selectedIndex = i;
            } else if (selectedIndex !== null && board[i] === null) {
                // Simplified move logic: check if neighbors
                const row1 = Math.floor(selectedIndex / 5), col1 = selectedIndex % 5;
                const row2 = Math.floor(i / 5), col2 = i % 5;
                if (Math.abs(row1 - row2) <= 1 && Math.abs(col1 - col2) <= 1) {
                    board[i] = turn;
                    board[selectedIndex] = null;
                    turn = turn === 'red' ? 'blue' : 'red';
                    selectedIndex = null;
                }
            }
            render();
        }

        function resetGame() { init(); }
        init();
    </script>
</body>
</html>
